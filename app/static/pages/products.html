<!doctype html>
<html lang="ru">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>СохтМатериал | Маҳсулотҳо</title><link rel="stylesheet" href="/css/styles.css" /></head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/"><div class="brand-icon">С</div><span data-i18n="brand_full">СохтМатериал</span></a>
    <nav class="nav" id="main-nav">
      <a href="/"  data-i18n="nav_home">Асосӣ</a>
      <a href="/pages/categories.html"  data-i18n="nav_categories">Категорияҳо</a>
      <a href="/pages/products.html" class="active" data-i18n="nav_products">Маҳсулотҳо</a>
      <a href="/pages/cart.html" ><span data-i18n="nav_orders">Тамос</span> <span class="cart-badge" id="cart-count">0</span></a>
      <a href="/pages/admin-users.html" class="admin-only" style="display:none" data-i18n="admin_users">Админ</a>
      <a href="/pages/admin-products.html" class="admin-only" style="display:none" data-i18n="admin_products">Молҳо</a>
    </nav>
    <div class="topbar-right">
      <div class="settings-bar">
        <label class="theme-switch"><input type="checkbox" id="theme-toggle" onchange="setTheme(this.checked?'dark':'light')" /><span class="slider"></span></label>
        <select class="lang-select" id="lang-select" onchange="setLang(this.value)"><option value="tj">TJ</option><option value="ru">RU</option><option value="en">EN</option></select>
      </div>
      <a href="/pages/auth.html" id="auth-link" class="btn btn-primary btn-login" data-i18n="login">Ворид шудан</a>
      <button class="burger" id="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMenu()"></div>
<main class="layout">
  <section class="toolbar">
    <input id="search" type="search" data-i18n="search_placeholder" placeholder="Ҷустуҷӯ: семент, кошин, асбоб..." />
    <select id="category"></select>
    <label class="check"><input id="in-stock" type="checkbox" /> <span data-i18n="in_stock">Дар анбор</span></label>
    <button class="btn btn-primary btn-sm" id="search-btn" data-i18n="find">Ёфтан</button>
  </section>
  <section id="products" class="product-grid"></section>
</main>
<footer class="footer">
  <div class="footer-inner">
    <div>
      <div class="footer-brand" data-i18n="brand_full">СохтМатериал</div>
      <p data-i18n="footer_desc">Маводҳои сохтмонии баландсифат аз беҳтарин истеҳсолкунандагон.</p>
    </div>
    <div>
      <h4 data-i18n="footer_nav">Навигатсия</h4>
      <a href="/" data-i18n="nav_home">Асосӣ</a>
      <a href="/pages/products.html" data-i18n="nav_products">Маҳсулотҳо</a>
    </div>
    <div>
      <h4 data-i18n="footer_contact">Тамос</h4>
      <a href="tel:+992000000000">+992 (00) 000-00-00</a>
      <a href="mailto:info@sokhtmaterial.tj">info@sokhtmaterial.tj</a>
    </div>
  </div>
  <div class="footer-bottom">
    <span>&copy; 2024 СохтМатериал</span>
    <span data-i18n="footer_rights">Ҳамаи ҳуқуқҳо маҳфузанд</span>
  </div>
</footer>
<div class="toast-container" id="toast-container"></div>
<script>
function toggleMenu(){
  document.getElementById("main-nav").classList.toggle("open");
  document.getElementById("burger").classList.toggle("open");
  document.getElementById("mobile-overlay").classList.toggle("open");
  document.body.style.overflow=document.getElementById("main-nav").classList.contains("open")?"hidden":"";
}
</script>
<script src="/js/api.js"></script><script src="/js/i18n.js"></script><script src="/js/theme.js"></script><script src="/js/catalog.js"></script>
</body></html>
